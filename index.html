<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#0b0b10" />
    <title>Crevi Loc Web</title>
  </head>
  <body>
    <div id="app" class="app theme-dark">
      <header class="topbar">
        <div>
          <h1>Crevi Loc Web</h1>
          <p>Busca una partida y abre la ubicación exacta en Google Maps.</p>
        </div>
        <label class="theme-toggle">
          <span id="themeLabel">Tema oscuro</span>
          <span class="theme-switch">
            <input id="themeSwitch" type="checkbox" aria-label="Cambiar tema" />
            <span class="theme-switch-slider" aria-hidden="true"></span>
          </span>
        </label>
      </header>

      <main class="panel">
        <label class="field">
          <span>Partida</span>
          <select id="partidaSelect"></select>
        </label>

        <label class="field">
          <span>Numero</span>
          <input id="numberInput" type="number" inputmode="numeric" placeholder="Ej. 6" />
        </label>

        <label class="field">
          <span>Letra (opcional)</span>
          <input id="suffixInput" type="text" maxlength="3" placeholder="Ej. A" />
        </label>

        <button id="searchButton" class="primary">Buscar</button>
        <p id="statusText" class="status"></p>

        <section id="resultCard" class="result hidden">
          <h2 id="resultTitle"></h2>
          <p id="resultCoords"></p>
          <div class="actions">
            <button id="openMapsButton" class="primary">Abrir en Maps</button>
            <button id="shareButton" class="secondary">Compartir</button>
          </div>
        </section>

        <nav class="download-links" aria-label="Descargas">
          <a href="./downloads/crevi-loc.apk" download>Descarga la App</a>
          <button id="showQrButton" type="button">Mostrar QR Web</button>
        </nav>
      </main>
    </div>

    <dialog id="qrDialog" class="qr-dialog" aria-labelledby="qrDialogTitle">
      <h2 id="qrDialogTitle">QR de Crevi Loc Web</h2>
      <img src="./downloads/crevi-loc-web-qr.png" alt="Código QR para acceder a Crevi Loc Web" />
      <div class="qr-dialog-actions">
        <button id="qrDialogBack" class="secondary" type="button">Atrás</button>
        <a class="primary" href="./downloads/crevi-loc-web-qr.png" download>Descargar QR</a>
      </div>
    </dialog>

    <script type="module" src="./src/main.js"></script>
  </body>
</html>
